backend = "xrender";
vsync = true;

shadow = true;
shadow-radius = 4;
shadow-offset-x = -3;
shadow-offset-y = -3;
shadow-opacity = 0.22;

fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 5;

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

blur-method = "none";
blur-background = false;

detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
use-damage = true;

shadow-exclude = [
  "class_g = 'i3bar'",
  "class_g = 'dmenu'",
  "class_g = 'Dunst'",
  "class_g = 'Conky'",
  "class_g = 'XScreenSaver'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

wintypes:
{
  dock = { shadow = false; };
  desktop = { shadow = false; };
  dnd = { shadow = false; };
  tooltip = { shadow = false; };
  popup_menu = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
};
